version: 2

project_name: claude-history

before:
  hooks:
    - cargo fetch --locked

builds:
  - id: claude-history
    builder: rust
    binary: claude-history
    command: build
    tool: cargo-zigbuild
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-pc-windows-gnu

archives:
  - ids:
      - claude-history
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  disable: true

source:
  enabled: false

homebrew_casks:
  - name: claude-history
    directory: Casks
    homepage: https://github.com/simonwhitaker/claude-code-history
    repository:
      owner: simonwhitaker
      name: homebrew-tap
    commit_author:
      name: Simon Whitaker
      email: sw@netcetera.org
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/claude-history"]
          end
